<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LÖVE Game</title>
<style>
body{
    margin:0;
    background:#000;
}
canvas{
    display:block;
    margin:auto;
}
</style>
</head>
<body>

<canvas id="canvas" width="500" height="500"></canvas>

<script>
(function(){

var canvas = document.getElementById('canvas'), ctx;

var Msg = function(m)
{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#888';
    ctx.fillText(m, canvas.width/2, canvas.height/2);
};

var Fail = function(m)
{
    alert("WebGL error: " + m);
};

var DoExecute = function()
{
    Module.canvas = canvas.cloneNode(false);
    Module.canvas.oncontextmenu = function(e){ e.preventDefault(); };
    Module.setWindowTitle = function(){};

    Module.postRun = function()
    {
        if (!Module.noExitRuntime) { Fail(); return; }
        canvas.parentNode.replaceChild(Module.canvas, canvas);
        Module.canvas.focus();
    };

    setTimeout(function(){ Module.run(['/p']); },50);
};

var DoLoad = function()
{
    Module = {
        TOTAL_MEMORY: 1024*1024*50,
        TOTAL_STACK: 1024*1024*5,
        currentScriptUrl: '-',
        preInit: DoExecute
    };

    var s = document.createElement('script');
    s.src = 'index.js';
    s.async = true;
    document.body.appendChild(s);
};

canvas.oncontextmenu = function(e){ e.preventDefault(); };

ctx = canvas.getContext('2d');
ctx.font = '30px sans-serif';
ctx.textAlign = 'center';

DoLoad();

})();
</script>

</body>
</html>
